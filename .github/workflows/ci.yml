name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs, but only for PRs. A force-push or quick follow-up
# commit on a PR otherwise leaves the obsolete run grinding through a full
# install + typecheck + lint + test for no reason, hogging runner minutes and
# the concurrency queue.
#
# Pushes to `main` must NEVER be superseded: each post-merge run reflects the
# actual shipped state of main (including the advisory `windows` lane), so every
# back-to-back merge has to run to completion. `cancel-in-progress: false`
# alone is NOT enough — GitHub allows only one running + one PENDING run per
# group, and a newly-queued run cancels the existing pending one regardless of
# that flag. So the group must be UNIQUE per push run: `github.run_id` gives
# each push its own group (nothing to collide with), while PRs keep a shared
# per-PR group so a new commit supersedes the previous run for that same PR.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-pr-{1}', github.workflow, github.event.pull_request.number) || format('{0}-run-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: typecheck / lint / format / test
    runs-on: ubuntu-latest
    env:
      # Tests don't hit Fireworks, but src/agent/auth.ts gates startup on this
      # var being present (process.exit(1) otherwise). A dummy value is enough.
      FIREWORKS_API_KEY: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned (not `latest`) for two reasons. (1) `bun test --parallel`
          # below requires ≥1.3.13. `latest` happens to satisfy this today,
          # but a future Bun rollback would silently break CI. (2) `latest`
          # makes setup-bun call api.github.com/repos/oven-sh/bun/git/refs/tags
          # to resolve the version, which intermittently 401s under GHA
          # token contention; a pinned version skips that lookup and goes
          # straight to the release download URL.
          bun-version: 1.3.14

      - name: Cache Bun install cache
        # setup-bun caches only the Bun BINARY, not downloaded packages, so a
        # cold runner re-fetches all 674 deps (~821MB) every run — the dominant
        # cost that grew as the dependency tree did. Cache Bun's global tarball
        # store (~/.bun/install/cache), NOT node_modules: bun hardlinks packages
        # from that store into node_modules, so a restored node_modules would be
        # dangling hardlinks, and platform-specific native builds (sharp,
        # onnxruntime, @huggingface/transformers) must be linked per-runner from
        # the tarball anyway. Key on the lockfile hash; restore-keys lets a
        # changed lockfile reuse the prior cache for everything that didn't move.
        # A cache hit also sidesteps the flaky api.github.com tarball fetch that
        # the retry loop below exists for — fewer cold fetches, fewer 504s.
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - name: Install dependencies
        # GitHub tarball deps (e.g. libsignal-node, pinned via @whiskeysockets/baileys)
        # are fetched from api.github.com, which intermittently 504s under GHA token
        # contention and kills the whole run before any test executes. Retry the fetch;
        # the lockfile stays frozen so each attempt is the same deterministic install.
        # shell: bash so the loop runs identically on the windows-* jobs (Git Bash is
        # present on windows-latest; the default shell there is pwsh, not bash).
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi
            if [ "$attempt" = 3 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Configure git identity
        # Several tests shell out to `git commit` against tmp repos. GitHub
        # Actions runners have no global user.name/user.email, so the commits
        # would silently fail and leave files staged.
        run: |
          git config --global user.email "ci@typeclaw.dev"
          git config --global user.name "TypeClaw CI"

      - name: Test
        # --parallel distributes test files across CPU workers (added in Bun
        # 1.3.13). Cuts wall time ~3-4x on multi-core runners by lifting the
        # historical "all files in one process" serial bottleneck.
        # --timeout 30000: a handful of runInit tests shell out to a real
        # `bun install` and run 4-5s locally; that crosses the 5s default on
        # the slower GitHub Actions runners.
        run: bun test --parallel --timeout 30000

  flake-guard:
    # Contention guard. A single `bun test --parallel` run almost never
    # reproduces our flaky tests — they only surface when the worker pool is
    # OVERSUBSCRIBED (more in-flight test workers than cores), which starves
    # timing-sensitive tests (subprocess cold-starts, watchdog deadlines, fixed
    # abort timers) past their budgets. This lane forces that state by running
    # TWO full `--parallel` suites concurrently on the same runner, turning a
    # rare random CI flake into a deterministic pre-merge signal. If a future
    # change reintroduces a contention-sensitive test, it fails HERE instead of
    # randomly on someone else's unrelated PR.
    #
    # Required (NOT continue-on-error): the whole point is to block the merge.
    # Runs on PRs and main pushes. Reuses the same Bun + cache setup as `ci`.
    name: flake guard (oversubscribed parallel)
    runs-on: ubuntu-latest
    env:
      FIREWORKS_API_KEY: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi
            if [ "$attempt" = 3 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Configure git identity
        run: |
          git config --global user.email "ci@typeclaw.dev"
          git config --global user.name "TypeClaw CI"

      - name: Test under oversubscription
        # Two concurrent full suites. Each is `--parallel` (one worker per core),
        # so running two at once doubles in-flight workers vs cores — the exact
        # starvation condition that exposes contention flakes. `wait` on both
        # PIDs; if either exits non-zero, fail the job. The 60s timeout absorbs
        # the slower per-test wall time under deliberate oversubscription so a
        # failure means a genuine flake, not the contention overhead itself.
        shell: bash
        run: |
          bun test --parallel --timeout 60000 > /tmp/flake-a.log 2>&1 &
          pid_a=$!
          bun test --parallel --timeout 60000 > /tmp/flake-b.log 2>&1 &
          pid_b=$!
          rc=0
          wait $pid_a || rc=1
          wait $pid_b || rc=1
          echo '===== suite A tail ====='; tail -40 /tmp/flake-a.log
          echo '===== suite B tail ====='; tail -40 /tmp/flake-b.log
          exit $rc

  windows:
    # Native-Windows host support (#899) is experimental. This single lane proves
    # the toolchain (bun install + typecheck/lint/format) AND the full test suite
    # run on native Windows. It was previously two jobs (windows-static +
    # windows-test); they were merged because each paid the SAME cold-start cost
    # twice — on Windows, `actions/checkout` (NTFS many-small-files) and
    # `bun install` (per-runner native rebuilds of sharp / onnxruntime /
    # @huggingface/transformers) dominate wall time, and a non-blocking advisory
    # lane should not pay that twice. One job = one checkout, one Bun setup, one
    # cache restore, one install — then static checks, then tests, in sequence.
    #
    # Static checks run BEFORE the suite and fail fast (no `if: always()`): if
    # typecheck/lint/format already break on Windows, the test result is rarely
    # actionable and not worth the extra (expensive) Windows minutes. The job log
    # still attributes failure to the specific step (Typecheck / Lint / Format /
    # Test), so merging costs no diagnostic granularity.
    #
    # Runs on PRs (not just post-merge): now that the Windows suite passes, the
    # pre-merge signal catches Windows regressions before they reach main, which
    # is worth the Windows-runner cost. continue-on-error keeps it advisory for
    # now; drop it to make this a required, merge-blocking check once the lane has
    # stayed green across a few PRs. The longer --timeout absorbs the slower
    # Windows runner so a test failure reflects a real incompatibility, not a
    # timeout. timeout-minutes caps a hung install/test instead of letting it
    # grind against GitHub's 6-hour default on a 2x-cost runner.
    name: windows checks (typecheck / lint / format / test)
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    continue-on-error: true
    timeout-minutes: 30
    env:
      FIREWORKS_API_KEY: dummy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install cache
        # Same rationale as the `ci` job's cache step. The ${{ runner.os }} key
        # prefix keeps this Windows cache separate from the Linux one — the
        # tarball store layout differs per OS and must never cross-contaminate.
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - name: Install dependencies
        # GitHub tarball deps (e.g. libsignal-node, pinned via @whiskeysockets/baileys)
        # are fetched from api.github.com, which intermittently 504s under GHA token
        # contention and kills the whole run before any test executes. Retry the fetch;
        # the lockfile stays frozen so each attempt is the same deterministic install.
        # shell: bash so the loop runs identically to the Linux jobs (Git Bash is
        # present on windows-latest; the default shell there is pwsh, not bash).
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then
              exit 0
            fi
            if [ "$attempt" = 3 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Configure git identity
        # Several tests shell out to `git commit` against tmp repos. GitHub
        # Actions runners have no global user.name/user.email, so the commits
        # would silently fail and leave files staged.
        run: |
          git config --global user.email "ci@typeclaw.dev"
          git config --global user.name "TypeClaw CI"

      - name: Test
        run: bun test --parallel --timeout 60000
