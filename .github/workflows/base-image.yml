name: Base image (PR validation)

# Validates that the base image Dockerfile generated by
# scripts/emit-base-dockerfile.ts still builds. Runs on PRs that touch the
# recipe so syntax errors, broken curl-impersonate URLs/SHAs, missing
# upstream packages, and QEMU regressions surface before merge.
#
# Publishing happens in release.yml, tagged with the CLI release version,
# so end users get exactly one base image per CLI version with no orphan
# tags between releases. workflow_dispatch stays here as an emergency
# escape hatch for republishing without cutting a CLI release (e.g. an
# upstream registry rotates a binary the recipe pulled in by SHA).

on:
  pull_request:
    paths:
      - 'src/init/dockerfile.ts'
      - 'scripts/emit-base-dockerfile.ts'
      - '.github/workflows/base-image.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate base Dockerfile
        # No `bun install` needed — scripts/emit-base-dockerfile.ts only
        # imports dockerfile.ts, which has type-only imports from
        # @/config/config.
        run: bun run scripts/emit-base-dockerfile.ts > base.Dockerfile

      - name: Show generated Dockerfile
        run: cat base.Dockerfile

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        # Login + push only happens on workflow_dispatch (manual emergency
        # rebuild). PR runs build but never publish, so they need neither
        # login nor the registry cache write below.
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        # workflow_dispatch publishes to a `dev-<sha>` namespace, never
        # `:latest` and never `:<version>`. The version-pinned tags AND
        # the human-facing `:latest` tag are reserved for release.yml so
        # the version → image mapping has exactly one writer and `:latest`
        # always corresponds to a shipped CLI version. A maintainer testing
        # a curl-impersonate bump between releases can promote a dev tag
        # to `:latest` manually if needed, but the workflow never does it
        # automatically.
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/typeclaw-base
          tags: |
            type=raw,value=dev-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build (and push on workflow_dispatch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-backed cache (stored as a separate manifest in GHCR)
          # is shared with release.yml so a release-time rebuild benefits
          # from the most recent PR validation's layer cache.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/typeclaw-base:cache
          # Only write to cache from a workflow_dispatch on main. PR runs
          # are read-only by design (forks have read-only GITHUB_TOKEN
          # anyway), and gating dispatch writes on `refs/heads/main`
          # narrows the trust surface — a maintainer can't accidentally
          # poison release.yml's cache by dispatching from a feature
          # branch with experimental dockerfile.ts changes.
          cache-to: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/typeclaw-base:cache,mode=max', github.repository_owner) || '' }}
