name: Base image (PR validation)

# Validates that the base image Dockerfile generated by
# scripts/emit-base-dockerfile.ts still builds. Runs on PRs that touch the
# recipe so syntax errors, broken curl-impersonate URLs/SHAs, missing
# upstream packages, and cross-architecture build regressions surface before
# merge.
#
# Each architecture builds on a NATIVE runner — amd64 on `ubuntu-latest`,
# arm64 on `ubuntu-24.04-arm` — instead of emulating arm64 under QEMU on a
# single amd64 runner. The heavy native installs in the recipe
# (@huggingface/transformers + sharp + onnxruntime, Chrome for Testing,
# curl-impersonate) ran ~5x slower under QEMU; the prior single-job build
# took ~5min, dominated entirely by the emulated arm64 leg. Native runners
# build both arches in parallel in ~1min while still proving the recipe
# builds for both real target architectures before merge. (Trade-off: the
# QEMU code path itself is no longer exercised here. release.yml still
# assembles its multi-arch manifest under QEMU, so genuinely
# QEMU-emulation-specific breakage surfaces at release time, not pre-merge —
# an accepted gap given users run native arm64 (Apple Silicon) and native
# amd64, never QEMU.)
#
# Publishing happens in release.yml, tagged with the CLI release version,
# so end users get exactly one base image per CLI version with no orphan
# tags between releases. workflow_dispatch stays here as an emergency
# escape hatch for republishing without cutting a CLI release (e.g. an
# upstream registry rotates a binary the recipe pulled in by SHA).

on:
  pull_request:
    paths:
      - 'src/init/dockerfile.ts'
      - 'scripts/emit-base-dockerfile.ts'
      - '.github/workflows/base-image.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

# Cancel superseded runs on the same PR (or the same ref for
# workflow_dispatch). A force-push or a quick follow-up commit while a build
# is mid-flight would otherwise leave the old ~1-min-per-arch build running
# to completion for no reason. release-critical builds live in release.yml,
# which has no concurrency group, so cancelling here never races a publish.
concurrency:
  group: base-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    # One job per target architecture, each on a native runner so the arm64
    # leg runs at native speed instead of under QEMU emulation. `fail-fast:
    # false` so a break on one arch still reports the other's result —
    # cross-arch recipe bugs (e.g. a package that exists on amd64 but not
    # arm64) are easier to diagnose when both legs run to completion.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (not `latest`) so setup-bun skips its
          # api.github.com/repos/oven-sh/bun/git/refs/tags resolution call,
          # which intermittently 401s under GHA token contention. The
          # Dockerfile this workflow emits doesn't itself depend on the
          # Bun version (only its TypeScript imports do); matches the pin
          # in ci.yml and release.yml so all three jobs use the same Bun.
          bun-version: 1.3.14

      - name: Generate base Dockerfile
        # No `bun install` needed — scripts/emit-base-dockerfile.ts only
        # imports dockerfile.ts, which has type-only imports from
        # @/config/config.
        run: bun run scripts/emit-base-dockerfile.ts > base.Dockerfile

      - name: Show generated Dockerfile
        run: cat base.Dockerfile

      # No docker/setup-qemu-action: each matrix leg builds its own native
      # architecture, so there is no foreign-platform emulation to register.

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        # Login + push only happens on workflow_dispatch (manual emergency
        # rebuild). PR runs build but never publish, so they need neither
        # login nor the registry cache write below.
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        # workflow_dispatch publishes to a per-arch `dev-<sha>-<arch>`
        # namespace, never `:latest` and never `:<version>`. The version-
        # pinned tags AND the human-facing `:latest` tag are reserved for
        # release.yml so the version → image mapping has exactly one writer
        # and `:latest` always corresponds to a shipped CLI version.
        #
        # The `-<arch>` suffix is load-bearing now that the build is split:
        # each matrix leg pushes a SINGLE-platform image, so an unsuffixed
        # `dev-<sha>` tag would have the two legs clobber each other — the
        # second push would replace the first with a single-arch manifest
        # instead of producing a multi-arch list. Suffixing keeps both
        # arch images independently inspectable; a maintainer reassembling
        # a multi-arch `dev-<sha>` can `docker buildx imagetools create`
        # from the two suffixed tags if needed.
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/typeclaw-base
          tags: |
            type=raw,value=dev-${{ github.sha }}-${{ matrix.arch }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build (and push on workflow_dispatch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base.Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-arch registry cache (stored as a separate manifest in GHCR).
          # Split from the single shared `:cache` ref because the two matrix
          # legs run concurrently and would otherwise race on one cache
          # manifest. release.yml's multi-arch build reads the unsuffixed
          # `:cache` ref it writes itself; these per-arch refs are a
          # PR-validation convenience that does not feed the release path.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/typeclaw-base:cache-${{ matrix.arch }}
          # Only write to cache from a workflow_dispatch on main. PR runs
          # are read-only by design (forks have read-only GITHUB_TOKEN
          # anyway), and gating dispatch writes on `refs/heads/main`
          # narrows the trust surface — a maintainer can't accidentally
          # poison the cache by dispatching from a feature branch with
          # experimental dockerfile.ts changes.
          cache-to: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && format('type=registry,ref=ghcr.io/{0}/typeclaw-base:cache-{1},mode=max', github.repository_owner, matrix.arch) || '' }}
