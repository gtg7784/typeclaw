name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (x.y.z)'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        # Bump per-test timeout from the 5s default: a handful of runInit tests
        # shell out to a real `bun install` and run 4-5s on local hardware,
        # which crosses 5s on the slower GitHub Actions runners.
        run: bun test --timeout 30000

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump version
        # TypeClaw publishes raw TS sources (no build step), and has no
        # .claude-plugin/plugin.json or skill `version:` frontmatter to sync —
        # package.json is the only place a version lives.
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "${{ inputs.version }}"
          git tag "${{ inputs.version }}"
          git push origin HEAD --tags

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        run: gh release create "${{ inputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
